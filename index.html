<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mighty Pens - Classroom Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
<style>
    /* --- DESIGNER'S COLOR PALETTE --- */
    :root {
        --bg-yellow: #ffcf33;
        --bg-orange: #f28b00;
        --coral-red: #ff786e;
        --peach-light: #ffb666;
        --purple-main: #7b2cbf;
        --purple-dark: #3b0f69;
        --purple-tooltip: #a855f7;
        --logo-stroke: #ffa600;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --star-gold: #fbbf24;
        --tip-orange: #ffedcc; 
        --tip-accent: #f59e0b;
    }

    * { box-sizing: border-box; }
    
    html, body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden; 
        font-family: 'Nunito', system-ui, sans-serif;
        background: linear-gradient(135deg, var(--bg-yellow) 0%, var(--bg-orange) 100%);
        color: var(--text-main);
    }

    /* --- BACKGROUND STAGING --- */
    .bg-shape {
        position: absolute;
        z-index: 0;
        opacity: 1;
        pointer-events: none;
    }

    .bg-left {
        bottom: -5vh;
        left: -5vw;
        width: 65vw;
        max-width: 1200px;
        height: auto;
        min-width: 750px;
        filter: drop-shadow(15px -5px 25px rgba(200, 70, 0, 0.35));
    }

    .bg-right-wave {
        top: -5vh;
        right: -5vw;
        width: 35vw;
        max-width: 600px;
        height: auto; 
        min-width: 350px;
        filter: drop-shadow(-15px 10px 25px rgba(200, 70, 0, 0.25));
    }

    /* --- APP LAYOUT --- */
    .app-container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        padding: 1% 40px 20px; 
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        min-height: 140px;
    }

    .crowns-container {
        display: flex;
        gap: 8px;
        margin-top: 15px;
    }

    .crown-wrapper {
        position: relative;
        width: 60px;
        height: 50px;
    }

    .crown-svg { width: 100%; height: 100%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); transition: transform 0.2s; }

    .logo-img {
        width: 850px; 
        max-width: 45vw;
        height: auto;
        filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
        margin-top: -35px; 
        margin-right: -10px;
        position: relative;
        z-index: 200;
    }

    /* --- THE DASHBOARD GRID --- */
    .dashboard-grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 2.5fr 1fr; 
        gap: 40px;
        align-items: center;
        margin-top: -28vh; 
        max-width: 2000px;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
    }

    /* COL 1: MASCOT */
    .mascot-col {
        position: relative;
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
        padding-bottom: 20px;
    }

    .mascot-area {
        position: relative;
        width: 420px; 
        max-width: 24vw;
        transform: translate(-300px, -200px) rotate(-15deg);
        opacity: 0;
        animation: mascotSlide 1s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.5s;
        z-index: 100;
    }

    @keyframes mascotSlide {
        to { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    }

    .mascot-img {
        width: 100%;
        height: auto;
        display: block;
        filter: drop-shadow(0 20px 35px rgba(0,0,0,0.25));
    }

    /* FOG/SMOKE EFFECT */
    .smoke-puff {
        position: absolute;
        bottom: 0px;
        left: -50px;
        width: 250px;
        height: 150px;
        pointer-events: none;
        opacity: 0;
        z-index: 150;
        filter: blur(10px);
    }

    .smoke-puff.animate {
        animation: fogFade 2s ease-out forwards 1.5s; 
    }

    @keyframes fogFade {
        0% { transform: scale(0.3) translateY(20px); opacity: 0; }
        20% { opacity: 0.8; }
        100% { transform: scale(2) translateY(-60px); opacity: 0; }
    }

    .speech-bubble {
        position: absolute;
        top: 22%;
        left: 80%;
        background: #333;
        color: white;
        padding: 14px 22px;
        border-radius: 20px;
        font-weight: 800;
        font-size: clamp(0.9rem, 1.1vw, 1.1rem);
        white-space: nowrap;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        z-index: 500; 
        opacity: 0;
        animation: bubblePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.5s; 
    }

    @keyframes bubblePop {
        from { transform: scale(0) translateX(-20px); opacity: 0; }
        to { transform: scale(1) translateX(0); opacity: 1; }
    }

    .speech-bubble::after {
        content: '';
        position: absolute;
        top: 50%;
        left: -12px; 
        transform: translateY(-50%);
        border-width: 8px 12px 8px 0;
        border-style: solid;
        border-color: transparent #333 transparent transparent;
    }

    /* COL 2: EDITOR */
    .editor-box {
        background: #ffffff;
        border-radius: 40px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        display: flex;
        flex-direction: column;
        height: 62vh;
        overflow: visible; 
        border: 4px solid #fff;
        position: relative;
        z-index: 10;
    }

    .topic-pill {
        position: absolute;
        top: -24px;
        left: 50%;
        transform: translateX(-50%) translateY(-300px);
        background: var(--coral-red);
        color: white;
        padding: 10px 30px;
        border-radius: 50px;
        font-weight: 900;
        font-size: 1.2rem;
        box-shadow: 0 10px 20px rgba(255, 120, 110, 0.3);
        z-index: 50;
        white-space: nowrap;
        opacity: 0;
        animation: topicDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.5s; 
        /* Clickable functionality removed */
    }

    @keyframes topicDrop {
        to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    textarea {
        flex: 1;
        width: calc(100% - 60px);
        margin: 40px 30px 15px 30px; 
        border: 2px solid #f5f3ff;
        border-radius: 28px;
        padding: 35px;
        font-family: inherit;
        font-size: clamp(1.3rem, 1.7vw, 1.8rem);
        font-weight: 700;
        line-height: 1.6;
        resize: none;
        background: #ffffff;
        box-shadow: 0 12px 35px rgba(123, 44, 191, 0.08);
        transition: all 0.2s ease;
    }
    textarea:focus { outline: none; border-color: #d8b4fe; }

    /* LILAC BOX FIX: Match corners to parent */
    .editor-controls {
        background: #faf5ff; 
        padding: 18px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 2px solid #f3e8ff;
        border-radius: 0 0 36px 36px;
    }

    /* COL 3: SIDEBAR */
    .sidebar-col {
        display: flex;
        flex-direction: column;
        gap: 30px;
    }

    .info-card {
        background: #fff;
        padding: 28px;
        border-radius: 35px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        position: relative;
        border: 2px solid #fff;
        transition: transform 0.3s;
    }

    .info-card.star { transform: rotate(1.5deg); }
    .info-card.tip { 
        transform: rotate(-1.5deg); 
        background: var(--tip-orange); 
        border: 2px solid #fbd38d;
    }

    .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        font-weight: 900;
        font-size: 1.2rem;
    }
    .star .card-header { color: var(--bg-orange); }
    .tip .card-header { color: #92400e; }

    .card-body {
        font-style: italic;
        font-size: 1.05rem;
        color: var(--text-main);
        line-height: 1.5;
        padding-left: 18px;
    }
    .star .card-body { border-left: 5px solid var(--star-gold); color: var(--text-muted); }
    .tip .card-body { border-left: 5px solid #d97706; font-style: normal; }

    .card-badge {
        position: absolute;
        top: -15px;
        right: -15px;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        color: white;
    }
    .star .card-badge { background: var(--star-gold); }
    .tip .card-badge { background: var(--purple-main); }

    .card-footer {
        margin-top: 15px;
        font-weight: 800;
        font-size: 0.95rem;
        text-align: right;
        color: var(--text-main);
    }

    /* --- BUTTONS --- */
    .btn-submit {
        background: var(--purple-main);
        color: white;
        font-weight: 900;
        padding: 16px 45px;
        border-radius: 100px;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        box-shadow: 0 10px 20px rgba(123, 44, 191, 0.25);
        transition: transform 0.1s, background 0.2s;
    }
    .btn-submit:hover { background: var(--purple-dark); transform: scale(1.02); }

    /* --- BOTTOM TOOLKIT --- */
    .toolkit-wrapper {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 150;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .bottom-bar {
        display: none;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        background: rgba(255, 255, 255, 0.98);
        padding: 20px;
        border-radius: 35px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        margin-bottom: 12px;
        max-width: 1400px;
        width: 95vw;
    }

    .bottom-bar.open { display: flex; }

    .tooltip-btn {
        background: var(--purple-tooltip);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 20px;
        font-weight: 900;
        font-size: 0.85rem;
        cursor: help;
        position: relative;
        text-transform: uppercase;
        flex: 1 1 calc(10% - 10px);
        min-width: 110px;
        white-space: nowrap;
        transition: background 0.2s;
    }

    .tooltip-pop {
        position: absolute;
        bottom: calc(100% + 15px);
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        width: max-content;
        max-width: 280px;
        white-space: normal;
        background: white;
        color: var(--text-main);
        padding: 18px;
        border-radius: 15px;
        font-size: 0.95rem;
        line-height: 1.5;
        text-align: left;
        text-transform: none;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        pointer-events: none;
        z-index: 250;
    }
    .tooltip-btn:hover .tooltip-pop { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    .tooltip-pop strong { display: block; color: var(--purple-main); font-size: 1.1rem; margin-bottom: 6px; }

    /* Results Overlay */
    .result-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.98);
        z-index: 300;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 50px;
        text-align: center;
    }

    /* Toasts */
    .toastArea { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
    .toast {
        background: #1e293b;
        color: white;
        border-radius: 100px;
        padding: 14px 40px;
        font-weight: 800;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        animation: toastDrop 0.4s forwards;
    }
    @keyframes toastDrop { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 1550px) {
        .logo-img { width: 650px; }
        .mascot-area { width: 380px; }
        .dashboard-grid { margin-top: -18vh; }
    }
    @media (max-width: 1400px) {
        .dashboard-grid { grid-template-columns: 1fr 2fr; margin-top: -12vh; }
        .sidebar-col { display: none; }
    }
</style>
</head>
<body>

<svg class="bg-shape bg-left" viewBox="0 0 1000 600" preserveAspectRatio="xMinYMax meet" xmlns="http://www.w3.org/2000/svg">
    <path d="M 0 600 L 0 350 C 150 200 400 600 700 480 C 850 420 1000 550 1000 600 Z" fill="var(--coral-red)" />
</svg>

<svg class="bg-shape bg-right-wave" viewBox="0 0 400 1000" preserveAspectRatio="xMaxYMin meet" xmlns="http://www.w3.org/2000/svg">
    <path d="M 150 0 C 300 200 0 450 150 700 C 250 900 50 1000 50 1000 L 400 1000 L 400 0 Z" fill="var(--peach-light)" />
</svg>

<div class="toastArea" id="toastArea"></div>

<div class="app-container">
    
    <div class="top-bar">
        <div class="crowns-container" id="crownGrid"></div>
        <img src="logo.png" alt="Mighty Pens" class="logo-img">
    </div>

    <div class="dashboard-grid">
        
        <!-- COL 1: MASCOT -->
        <div class="mascot-col">
            <div class="mascot-area">
                <div class="speech-bubble">Booyar amigos!</div>
                
                <!-- PREMIUM FOGGY SMOKE EFFECT -->
                <svg class="smoke-puff animate" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="60" cy="80" r="40" fill="white" opacity="0.4" />
                    <circle cx="100" cy="60" r="50" fill="white" opacity="0.5" />
                    <circle cx="140" cy="90" r="45" fill="white" opacity="0.4" />
                    <circle cx="100" cy="100" r="30" fill="white" opacity="0.3" />
                </svg>

                <img src="mascot.png" alt="Mighty Pen" class="mascot-img">
            </div>
        </div>

        <!-- COL 2: EDITOR -->
        <div class="editor-col">
            <div class="editor-box">
                <!-- DROPPING TOPIC PILL (onclick removed) -->
                <div id="topicText" class="topic-pill">Topic: Loading...</div>

                <div class="result-overlay" id="resultOverlay">
                    <div id="resultText" style="font-size: 1.4rem; font-weight: 700; color: var(--purple-main); margin-bottom: 30px; max-width: 800px; line-height: 1.6; white-space: pre-wrap;"></div>
                    <div style="display: flex; gap: 15px;">
                        <button class="btn-submit" onclick="closeFeedback()">Continue Writing</button>
                        <button class="btn-submit" style="background: #10b981;" id="emailBtn" onclick="sendEmail()">Send to Mr C</button>
                    </div>
                </div>
                <textarea id="paragraph" placeholder="Type your mission report here..."></textarea>
                <div class="editor-controls">
                    <div id="wordCount" style="font-weight: 800; color: var(--text-muted); background: #fff; padding: 6px 16px; border-radius: 20px; border: 2px solid #f3e8ff;">Words: 0</div>
                    <button class="btn-submit" onclick="getFeedback()">CHECK WRITING</button>
                </div>
            </div>
        </div>

        <!-- COL 3: SIDEBAR -->
        <div class="sidebar-col">
            <div class="info-card star">
                <div class="card-badge">⭐</div>
                <div class="card-header">STAR OF THE WEEK</div>
                <div class="card-body" id="starText">"The rusted gate groaned—a warning from the past—as Marcus lunged forward."</div>
                <div class="card-footer" id="starAuthor">- Sarah, Year 5</div>
            </div>

            <div class="info-card tip">
                <div class="card-badge">💡</div>
                <div class="card-header">PRO LESSON</div>
                <div class="card-body" id="proTip">Use an em-dash — like this — to add extra detail mid-sentence.</div>
                <div class="card-footer" style="color: #92400e">Try it now!</div>
            </div>
        </div>

    </div>

    <!-- TOOLKIT -->
    <div class="toolkit-wrapper">
        <div class="bottom-bar" id="toolsMenu">
            <button class="tooltip-btn">WHO <div class="tooltip-pop"><strong>Character Intro</strong>Paragraph 1. Use 1 action → description → background story.</div></button>
            <button class="tooltip-btn">WHERE <div class="tooltip-pop"><strong>Setting Intro</strong>Paragraph 2. Use 1 action → location detail → history.</div></button>
            <button class="tooltip-btn">WHAT <div class="tooltip-pop"><strong>Purpose</strong>Paragraph 3. Use 1 action → thinking. Why are they here?</div></button>
            <button class="tooltip-btn">TENSION <div class="tooltip-pop"><strong>The Problem</strong>Paragraph 4. Use 1 action → atmosphere. Build suspense.</div></button>
            <button class="tooltip-btn">COMPLEX <div class="tooltip-pop"><strong>Complication</strong>Paragraph 5. Use 1 action → atmosphere. Make it worse!</div></button>
            <button class="tooltip-btn">RESOLVE <div class="tooltip-pop"><strong>The End</strong>Paragraph 6. Use 1 action → mixture → finish the story.</div></button>
            <button class="tooltip-btn">ACTION <div class="tooltip-pop"><strong>Strong Verbs</strong>Avoid: went, got, did. Use: lunged, sprinted, grabbed.</div></button>
            <button class="tooltip-btn">DESCRIBE <div class="tooltip-pop"><strong>Visuals</strong>Help the reader see the scene with precise words.</div></button>
            <button class="tooltip-btn">STORY <div class="tooltip-pop"><strong>The Why</strong>Add depth about childhood, fears, or secret hopes.</div></button>
            <button class="tooltip-btn">ATMOS <div class="tooltip-pop"><strong>Mood</strong>Show what is happening around the character.</div></button>
            <button class="tooltip-btn">THINK <div class="tooltip-pop"><strong>Reaction</strong>Show the character's reaction to the situation.</div></button>
            <button class="tooltip-btn">DIALOGUE <div class="tooltip-pop"><strong>Speech</strong>Keep it to just one strong line of dialogue.</div></button>
            <button class="tooltip-btn">QUAD VERB <div class="tooltip-pop"><strong>Power Move</strong>-ing opener + 3 verbs (e.g. Lunging, he spun, ducked, and bolted).</div></button>
            <button class="tooltip-btn">3x DESC <div class="tooltip-pop"><strong>Triple Set</strong>"With" opener + 3 vivid details of a thing or person.</div></button>
            <button class="tooltip-btn">EM-DASH <div class="tooltip-pop"><strong>Rhythm</strong>Add detail using spaced em-dashes — like this!</div></button>
            <button class="tooltip-btn">STARTS <div class="tooltip-pop"><strong>Bad Starts</strong>Avoid: The, It, A, An, I, My, We, Our.</div></button>
            <button class="tooltip-btn">REPEAT <div class="tooltip-pop"><strong>Word Variety</strong>Vary your nouns and verbs to keep energy high.</div></button>
            <button class="tooltip-btn">ADJECTIVE <div class="tooltip-pop"><strong>Aim for 12%</strong>Don't over-describe. Let the verbs do the work.</div></button>
        </div>
        <button class="btn-submit" style="background: var(--text-main); font-size: 1.1rem; display:flex; align-items:center; gap:12px;" onclick="toggleTools()">
            <span>🛠️</span> Mr C's Tools & Tips
        </button>
    </div>

</div>

<script>
    /* --- DATA ENGINE --- */
    const topics = ["Bravery", "The Lie", "Overboard", "Secrets", "The Dare", "The Shortcut", "The Escape", "Lost", "The Storm", "The Knock", "The Discovery", "The Phone Call", "The Stranger", "The Promise", "The Warning", "The Last Bus", "The Map", "The Key"];
    
    const lessonSets = [
        { example: "The rusted gate groaned—a warning from the past—as Marcus lunged forward.", author: "Sarah, Year 5", tip: "Use an em-dash — like this — to add extra detail mid-sentence." },
        { example: "Sprinting across the muddy field, he ducked, twisted, and dived behind the wall.", author: "James, Year 6", tip: "Start with an -ing word followed by three past-tense verbs for high energy!" },
        { example: "With a pounding heart, a torn sleeve, and mud in his eyes, he waited.", author: "Leo, Year 4", tip: "The Triple Descriptor: Use 'With' followed by three specific details." },
        { example: "The fog swallowed the trees, turning the park into a ghostly maze.", author: "Amelie, Year 5", tip: "Use strong verbs like 'swallowed' to bring settings to life (Personification)." }
    ];

    const skillDefs = [
        { id: "activeVerbs", name: "Active Verbs" }, { id: "goodStarts", name: "Good Starts" },
        { id: "adjectives", name: "Adjectives" }, { id: "complexity", name: "Complexity" },
        { id: "repetition", name: "Variety" }, { id: "atmosphere", name: "Atmosphere" },
        { id: "storyDepth", name: "Story Depth" }, { id: "craft", name: "Craft Moves" },
        { id: "pacing", name: "Pacing" }, { id: "vocabulary", name: "Vocabulary" }
    ];

    /* --- LOGIC ENGINE --- */
    function getBadgeState() {
        const saved = localStorage.getItem("mrCParagraphBadges_v12");
        if (saved) return JSON.parse(saved);
        const fresh = {}; skillDefs.forEach(b => fresh[b.id] = 0); return fresh;
    }
    function setBadgeState(state) { localStorage.setItem("mrCParagraphBadges_v12", JSON.stringify(state)); }

    function renderCrowns() {
        const state = getBadgeState();
        const grid = document.getElementById("crownGrid");
        grid.innerHTML = skillDefs.map(def => {
            const level = state[def.id] || 0;
            const fill = level > 0 ? "#ffd700" : "rgba(230, 210, 150, 0.3)";
            const stroke = level > 0 ? "#b8860b" : "#8b6508";
            return `
            <div class="crown-wrapper">
                <svg class="crown-svg" viewBox="0 0 100 80"><path d="M5,25 L25,45 L50,10 L75,45 L95,25 L88,75 L12,75 Z" fill="${fill}" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/></svg>
            </div>`;
        }).join("");
    }

    function analyseWriting(text) {
        const clean = text.toLowerCase();
        const words = clean.match(/[a-z']+/g) || [];
        const sentences = text.split(/[.!?]+/).map(s => s.trim()).filter(Boolean);
        const weakVerbs = ["went","got","did","made","looked","saw","felt","put","came","took","ran"];
        const badStarts = ["the","it","a","an","he","she","they","this","then","there","i","my","we","our","suddenly"];
        const beWords = ["was","were","is","are","be","been","being"];
        const adjectiveHints = ["y","ful","less","ous","ive","al","ic","ish","ary"];
        const atmosphereWords = ["wind","rain","shadow","dark","noise","silence","cold","fog","mist","storm","breeze","thunder","creak","rattle","night"];
        const storyWords = ["because","since","grew","growing","childhood","always","never","feared","hoped","dreamed","remembered","years","family","home","once"];

        const strongVerbCount = words.filter(w => /ed$|ing$/.test(w) && !beWords.includes(w) && !weakVerbs.includes(w)).length;
        const weakVerbCount = words.filter(w => weakVerbs.includes(w)).length;
        const badStartCount = sentences.filter(s => badStarts.includes((s.match(/[a-zA-Z']+/) || [""])[0].toLowerCase())).length;
        const adjectiveCount = words.filter(w => adjectiveHints.some(end => w.endsWith(end))).length;
        const adjectiveRatio = words.length ? adjectiveCount / words.length : 0;
        const complexSentenceCount = sentences.filter(s => /(because|although|while|when|since|if|after|before|as|who|that)/i.test(s) || (s.match(/,/g) || []).length >= 2).length;
        const freq = {}; words.forEach(w => { if (w.length > 4) freq[w] = (freq[w] || 0) + 1; });
        const repetitionScore = Object.values(freq).filter(v => v >= 3).length;
        const atmosphereCount = words.filter(w => atmosphereWords.includes(w)).length;
        const storyCount = words.filter(w => storyWords.includes(w)).length;
        const craftCount = (clean.match(/—/g) || []).length + (clean.match(/with [^.!?]*, [^.!?]*, and [^.!?]*/g) || []).length + (clean.match(/ing, [^.!?]*ed, [^.!?]*ed, and [^.!?]*ed/g) || []).length;
        return { strongVerbCount, weakVerbCount, badStartCount, adjectiveRatio, complexSentenceCount, repetitionScore, atmosphereCount, storyCount, craftCount };
    }

    function maybeLevelUp(text) {
        const state = getBadgeState();
        const metrics = analyseWriting(text);
        const changed = [];
        const checks = {
            activeVerbs: metrics.strongVerbCount >= [0,2,4,6,8][state.activeVerbs] && metrics.weakVerbCount <= Math.max(4 - state.activeVerbs, 1),
            goodStarts: metrics.badStartCount <= [99,4,3,2,1][state.goodStarts],
            adjectives: metrics.adjectiveRatio >= [0,.05,.07,.09,.1][state.adjectives] && metrics.adjectiveRatio <= .18,
            complexity: metrics.complexSentenceCount >= [0,1,2,3,4][state.complexity],
            repetition: metrics.repetitionScore <= [99,7,6,5,4][state.repetition],
            atmosphere: metrics.atmosphereCount >= [0,1,2,3,4][state.atmosphere],
            storyDepth: metrics.storyCount >= [0,1,2,3,4][state.storyDepth],
            craft: metrics.craftCount >= [0,1,1,2,2][state.craft],
            pacing: metrics.complexSentenceCount >= 1,
            vocabulary: metrics.strongVerbCount >= 3
        };
        skillDefs.forEach(def => { if ((state[def.id] || 0) < 5 && checks[def.id]) { state[def.id] += 1; changed.push(def.id); } });
        if (changed.length) { setBadgeState(state); renderCrowns(); showToast(`👑 Skills Upgraded!`); }
    }

    async function getFeedback() {
        const text = document.getElementById("paragraph").value.trim();
        const overlay = document.getElementById("resultOverlay");
        const resultText = document.getElementById("resultText");
        if(!text) { showToast("Please write your story first!"); return; }
        overlay.style.display = "flex";
        resultText.innerHTML = "Thinking... 🧐";
        try {
            const response = await fetch("/api/feedback", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text, topic: document.getElementById("topicText").innerText.replace("Topic: ", "") })
            });
            const data = await response.json();
            if (!response.ok) throw new Error();
            resultText.innerText = data.feedback;
            maybeLevelUp(text);
        } catch (error) {
            resultText.innerText = "Check your writing connection, amigos!";
        }
    }

    function rotateLesson() {
        const set = lessonSets[Math.floor(Math.random()*lessonSets.length)];
        document.getElementById("starText").innerText = `"${set.example}"`;
        document.getElementById("starAuthor").innerText = `- ${set.author}`;
        document.getElementById("proTip").innerText = set.tip;
    }

    function toggleTools() { document.getElementById("toolsMenu").classList.toggle("open"); }
    function closeFeedback() { document.getElementById("resultOverlay").style.display = "none"; }
    function newTopic() { document.getElementById("topicText").innerText = "Topic: " + topics[Math.floor(Math.random() * topics.length)]; }
    function showToast(text) {
        const area = document.getElementById("toastArea");
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = text;
        area.appendChild(toast);
        setTimeout(() => { toast.style.animation = "toastOut 0.3s forwards"; setTimeout(() => toast.remove(), 300); }, 3500);
    }

    function sendEmail() {
        const text = document.getElementById("paragraph").value.trim();
        const topicName = document.getElementById("topicText").innerText.replace("Topic: ", "");
        const body = encodeURIComponent(`Topic: ${topicName}\n\nStudent text:\n${text}`);
        window.location.href = `mailto:myessayfeedback@gmail.com?subject=My Writing - ${topicName}&body=${body}`;
    }

    document.getElementById("paragraph").addEventListener("input", function() {
        const words = this.value.trim() ? this.value.trim().split(/\s+/).length : 0;
        document.getElementById("wordCount").innerText = "Words: " + words;
    });

    // INIT
    newTopic();
    renderCrowns();
    rotateLesson();
    setInterval(rotateLesson, 15000);
</script>
</body>
